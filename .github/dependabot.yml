# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # homeassistant must stay in sync with the "homeassistant" key in hacs.json — update manually
      - dependency-name: "homeassistant"
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    groups:
      python-dependencies:
        applies-to: version-updates
        update-types:
          - minor
          - patch
