name: Release Please

on:
  push:
    branches:
      - main

# Required permissions for GITHUB_TOKEN to create releases and pull requests.
#
# Additionally, "Allow GitHub Actions to create and approve pull requests" must
# be enabled in your repository under Settings > Actions > General.
# See: https://github.com/googleapis/release-please-action?tab=readme-ov-file#workflow-permissions
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Skip on the template repo itself; flag flips to false on "Use this template" instantiations.
    if: github.event.repository.is_template != true
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
